details:
  blurb_en: We are gathering the people we love most in the city that stole our
    hearts. Over one unforgettable weekend, we will celebrate among the gardens
    and golden stone of a centuries-old Yucatecan hacienda.
  blurb_es: Reuniremos a las personas que más amamos en la ciudad que robó
    nuestros corazones. Durante un fin de semana inolvidable, celebraremos entre
    los jardines y la piedra dorada de una hacienda yucateca centenaria.
