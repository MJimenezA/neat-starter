    - /static/img/placeholders/mansion-xodo.svg
explore_teaser:
  image: /static/img/chatgpt-image-jun-1-2026-06_29_45-pm.png
  heading_en: Discover Mérida
  heading_es: Explora Mérida
  blurb_en: The White City is full of wonder — cenotes, Mayan ruins, colorful
    markets, incredible food, and some of the warmest people in Mexico. Make it
    a trip to remember.
  blurb_es: La Ciudad Blanca está llena de maravillas — cenotes, ruinas mayas,
    mercados coloridos, comida increíble y algunas de las personas más cálidas
    de México. Que sea un viaje para recordar.
  button_en: Explore the City
  button_es: Explora la Ciudad
  url: /explore/
