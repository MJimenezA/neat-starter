  label_es: Hasta que digamos "Sí, acepto"
events_intro:
  heading_en: Join Us
  heading_es: Únete a Nosotros
  blurb_en: We have three celebrations planned across the weekend — each one a
    chance to gather, celebrate, and enjoy Mérida together.
  blurb_es: Tenemos tres celebraciones planeadas durante el fin de semana — cada
    una, una oportunidad para reunirnos, celebrar y disfrutar Mérida juntos.
travel_teaser:
  image: /static/img/chatgpt-image-jun-1-2026-06_28_10-pm.png
  heading_en: Getting Here
  heading_es: Cómo Llegar
  blurb_en: Mérida is easily accessible from major U.S. cities with direct or
    one-stop flights. We recommend arriving a day or two early to soak in
    everything this magical city has to offer.
  blurb_es: Mérida es de fácil acceso desde las principales ciudades de EE. UU.
    con vuelos directos o con una escala. Recomendamos llegar uno o dos días
    antes para disfrutar de todo lo que esta ciudad mágica tiene para ofrecer.
  button_en: Travel Details
  button_es: Detalles de Viaje
  url: /travel/
stay_teaser:
  heading_en: Where to Stay
  heading_es: Dónde Hospedarse
  blurb_en: We've arranged room blocks at select hotels near the venue and in the
    heart of Mérida. From boutique haciendas to stylish Airbnbs, there's
    something for every style.
  blurb_es: Hemos reservado bloques de habitaciones en hoteles selectos cerca del
    lugar y en el corazón de Mérida. Desde haciendas boutique hasta Airbnbs con
    estilo, hay algo para cada gusto.
  button_en: View Accommodations
  button_es: Ver Hospedaje
  url: /travel/#stay
