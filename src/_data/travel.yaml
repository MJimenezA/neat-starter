    temporada de Carnaval.
transport:
  heading_en: Getting Around & Travel Tips
  heading_es: Transporte y Consejos de Viaje
  tips:
    - en: Uber works well throughout Mérida; taxis are plentiful. A car is handy only
        for day trips.
      es: Uber funciona bien en toda Mérida; hay muchos taxis. Un auto solo es útil
        para excursiones.
    - en: Currency is Mexican Pesos (MXN). Carry pesos for markets and smaller spots.
      es: La moneda es el Peso Mexicano (MXN). Lleva pesos para mercados y lugares
        pequeños.
    - en: Weather in March is warm and sunny, ~85°F / 29°C by day, comfortable
        evenings.
      es: El clima en marzo es cálido y soleado, ~29°C de día, noches agradables.
    - en: Mérida is consistently ranked one of the safest cities in Mexico — normal
        precautions apply.
      es: Mérida es constantemente clasificada como una de las ciudades más seguras de
        México — toma precauciones normales.
