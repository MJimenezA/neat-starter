  heading_en: Boutique & Airbnb Options
  heading_es: Opciones Boutique y Airbnb
  intro_en: For guests who prefer a more intimate or locally-flavored stay, Mérida
    has an excellent selection of boutique hotels and Airbnb casas in restored
    colonial homes.
  intro_es: Para los invitados que prefieren una estancia más íntima y con sabor
    local, Mérida tiene una excelente selección de hoteles boutique y casas
    Airbnb en hogares coloniales restaurados.
