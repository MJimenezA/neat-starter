  subtitle_es: Todo lo que necesitas para planear tu viaje a Mérida
getting_here:
  heading_en: Getting to Mérida
  heading_es: Cómo Llegar a Mérida
  points:
    - en: "Nearest airport: Mérida International Airport (MID)."
      es: "Aeropuerto más cercano: Aeropuerto Internacional de Mérida (MID)."
    - en: "Direct and connecting flights from major U.S. hubs: New York (JFK/EWR),
        Miami (MIA), Houston (IAH), Dallas (DFW)."
      es: "Vuelos directos y con escala desde los principales aeropuertos de EE. UU.:
        Nueva York (JFK/EWR), Miami (MIA), Houston (IAH), Dallas (DFW)."
    - en: "Approx. flight times: ~3.5 hrs from Miami, ~4.5 hrs from NYC."
      es: "Tiempos de vuelo aprox.: ~3.5 hrs desde Miami, ~4.5 hrs desde Nueva York."
    - en: "Ground transport from airport: taxi, Uber, or hotel shuttle (~20–30 min to
        Centro)."
      es: "Transporte desde el aeropuerto: taxi, Uber o transporte del hotel (~20–30
        min al Centro)."
    - en: Renting a car isn't necessary for city stays, but is useful for day trips.
      es: Rentar un auto no es necesario para la ciudad, pero es útil para
        excursiones.
when_to_arrive:
  heading_en: When to Arrive
  heading_es: Cuándo Llegar
  body_en: We recommend arriving Thursday, March 4 or Friday, March 5 to settle in
    and join us for the Welcome Dinner. Consider departing Sunday, March 7 or
    later if you'd like to explore more of Mérida and the Yucatán peninsula.
  body_es: Recomendamos llegar el jueves 4 o el viernes 5 de marzo para instalarte
    y acompañarnos a la Cena de Bienvenida. Considera partir el domingo 7 de
    marzo o después si deseas explorar más de Mérida y la península de Yucatán.
areas:
  heading_en: Recommended Areas to Stay
  heading_es: Zonas Recomendadas para Hospedarse
  list:
    - image: /static/img/chatgpt-image-jun-1-2026-06_35_52-pm.png
      name_en: Centro Histórico
      name_es: Centro Histórico
      desc_en: The heart of Mérida — walkable, vibrant, full of colonial architecture,
        restaurants, and markets. Perfect if you want to be in the middle of
        everything.
      desc_es: El corazón de Mérida — caminable, vibrante, lleno de arquitectura
        colonial, restaurantes y mercados. Perfecto si quieres estar en medio de
        todo.
      distance_en: ~15 min by car to the venue
      distance_es: ~15 min en auto al lugar
    - image: /static/img/chatgpt-image-jun-1-2026-06_28_10-pm.png
      name_en: Paseo de Montejo
      name_es: Paseo de Montejo
      desc_en: Mérida's grand boulevard, lined with mansions, galleries, and upscale
        restaurants. A beautiful, calm area with easy access to the city's
        highlights.
      desc_es: El gran bulevar de Mérida, bordeado de mansiones, galerías y
        restaurantes de alta categoría. Una zona hermosa y tranquila con fácil
        acceso a lo mejor de la ciudad.
      distance_en: ~12 min by car to the venue
      distance_es: ~12 min en auto al lugar
    - image: /static/img/placeholders/area-north.svg
      name_en: North Mérida / Altabrisa
      name_es: Norte de Mérida / Altabrisa
      desc_en: A modern, safe residential area with shopping, great restaurants, and
        proximity to the venue. A good option for families or newer
        accommodations.
      desc_es: Una zona residencial moderna y segura con centros comerciales,
        excelentes restaurantes y cercanía al lugar. Buena opción para familias
        o alojamientos más nuevos.
      distance_en: ~10 min by car to the venue
      distance_es: ~10 min en auto al lugar
