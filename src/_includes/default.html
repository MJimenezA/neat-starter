<!DOCTYPE html>
<html lang="en" data-lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta http-equiv="x-ua-compatible" content="ie=edge" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />

    <title>{% if title %}{{ title }} · {% endif %}Misael &amp; Michelle · Mérida 2027</title>
    <meta name="description" content="{% if description %}{{ description }}{% else %}Misael & Michelle are getting married on March 6, 2027 at Hacienda Chichí Suárez in Mérida, Yucatán. RSVP, travel, and things to do.{% endif %}" />

    <!-- Set language before paint to avoid a flash of the wrong language -->
    <script>
      try { document.documentElement.setAttribute("data-lang", localStorage.getItem("mm-lang") || "en"); } catch (e) {}
    </script>

    <link rel="icon" type="image/svg+xml" href="/favicon.svg" />
    <link rel="alternate icon" href="/favicon.ico" />
    <link rel="preconnect" href="https://fonts.googleapis.com" />
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
    <link rel="stylesheet" type="text/css" href="/static/css/style.css" />
    <style>[x-cloak]{display:none !important;}</style>
  </head>

  <body class="overflow-x-hidden">
    {% include "./partials/navbar.html" %}

    <main>{{ content | safe }}</main>

    {% include "./partials/footer.html" %}

    <script src="/static/js/alpine.js" defer></script>

    <script>
      // Bilingual store
      document.addEventListener("alpine:init", () => {
        Alpine.store("i18n", {
          lang: document.documentElement.getAttribute("data-lang") || "en",
          set(l) {
            this.lang = l;
            document.documentElement.setAttribute("data-lang", l);
            try { localStorage.setItem("mm-lang", l); } catch (e) {}
          },
        });
      });

      // Scroll reveal
      window.addEventListener("DOMContentLoaded", () => {
        const els = document.querySelectorAll(".reveal");
        if (!("IntersectionObserver" in window) || window.matchMedia("(prefers-reduced-motion: reduce)").matches) {
          els.forEach((el) => el.classList.add("is-visible"));
          return;
        }
        const io = new IntersectionObserver(
          (entries) => {
            entries.forEach((e) => {
              if (e.isIntersecting) {
                e.target.classList.add("is-visible");
                io.unobserve(e.target);
              }
            });
          },
          { threshold: 0.12, rootMargin: "0px 0px -8% 0px" }
        );
        els.forEach((el) => io.observe(el));
      });

      // Countdown to the wedding
      (function () {
        const target = new Date("{{ site.wedding_date }}").getTime();
        const elDays = document.getElementById("cd-days");
        if (!elDays) return;
        const pad = (n) => String(n).padStart(2, "0");
        function tick() {
          const diff = target - Date.now();
          const d = Math.max(0, Math.floor(diff / 86400000));
          const h = Math.max(0, Math.floor((diff % 86400000) / 3600000));
          const m = Math.max(0, Math.floor((diff % 3600000) / 60000));
          const s = Math.max(0, Math.floor((diff % 60000) / 1000));
          elDays.textContent = d;
          document.getElementById("cd-hours").textContent = pad(h);
          document.getElementById("cd-mins").textContent = pad(m);
          document.getElementById("cd-secs").textContent = pad(s);
        }
        tick();
        setInterval(tick, 1000);
      })();
    </script>

    {% if path == "home" %}
    <!-- Netlify Identity (powers the /admin content editor login) -->
    <script type="text/javascript" src="https://identity.netlify.com/v1/netlify-identity-widget.js"></script>
    <script>
      if (window.netlifyIdentity) {
        window.netlifyIdentity.on("init", (user) => {
          if (!user) {
            window.netlifyIdentity.on("login", () => { document.location.href = "/admin/"; });
          }
        });
      }
    </script>
    {% endif %}
  </body>
</html>
